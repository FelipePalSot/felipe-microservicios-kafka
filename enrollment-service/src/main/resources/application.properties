# SERVER
server.port=8084
spring.application.name=enrollment-service
# POSTGRESQL
spring.datasource.url=jdbc:postgresql://localhost:5441/enrollmentdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# KAFKA
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=enrollment-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# KAFKA TOPICS
kafka.topic.enrollment-events=lms.enrollment.events
kafka.topic.payment-events=lms.payment.events
# INTER-SERVICE
user.service.url=http://localhost:8081
course.service.url=http://localhost:8083
# LOGGING
logging.level.com.tecsup.app.micro.enrollment=DEBUG
logging.level.org.apache.kafka=WARN
